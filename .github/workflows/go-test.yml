name: Monorepo Tests

on:
  push:
    branches:
      - master
    paths:
      - "packages/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "package-lock.json"
      - "test-station.config.mjs"
      - "test-station.policy.json"
      - ".github/workflows/go-test.yml"
  pull_request:
    paths:
      - "packages/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "package-lock.json"
      - "test-station.config.mjs"
      - "test-station.policy.json"
      - ".github/workflows/go-test.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  manifest-validate:
    name: Find Bench Manifest Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Validate benchmark manifest fixtures
        run: |
          cd packages/api
          go test ./internal/grpcv1 -run '^TestFindBenchManifestFixtureRegression$|^TestValidateFindBenchSchemaVersion$|^TestResolveFindBenchManifestPathExampleAlias$' -count=1

      - name: Preflight validate example manifest from env
        run: |
          cd packages/api
          FIND_BENCH_SCENARIO_MANIFEST=example go test ./internal/grpcv1 -run '^TestFindBenchManifestPreflightFromEnv$' -count=1 -v

  protocol-matrix:
    name: Protocol Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Install gRPC codegen tooling
        shell: bash
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run protocol package tests
        run: cd packages/api && go test ./internal/app ./internal/input ./internal/observe

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: yarn install --immutable

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage grpcio protobuf

      - name: Install test tooling
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Capture test-station start time
        run: |
          echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run monorepo report
        id: test_station
        shell: bash
        run: |
          set +e
          yarn test:station:coverage
          exit_code=$?
          if [ "$exit_code" -eq 0 ]; then
            status=passed
          else
            status=failed
          fi
          echo "TEST_STATION_CI_STATUS=$status" >> "$GITHUB_ENV"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish test-station summary
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import fs from "node:fs";
          const report = JSON.parse(fs.readFileSync(".test-results/test-station/report.json", "utf8"));
          const summary = report.summary || {};
          const coveragePct = summary.coverage?.lines?.pct;
          console.log("### Monorepo Test Summary");
          console.log("");
          console.log(`- Packages: ${summary.totalPackages ?? 0}`);
          console.log(`- Suites: ${summary.totalSuites ?? 0}`);
          console.log(`- Tests: ${summary.totalTests ?? 0}`);
          console.log(`- Failed tests: ${summary.failedTests ?? 0}`);
          console.log(`- Failed packages: ${summary.failedPackages ?? 0}`);
          console.log(`- Line coverage: ${Number.isFinite(coveragePct) ? `${coveragePct}%` : "n/a"}`);
          EOF

      - name: Publish test-station ingest
        if: always() && hashFiles('.test-results/test-station/report.json') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          TEST_STATION_INGEST_ENDPOINT: https://test-station.smysnk.com/api/ingest
          TEST_STATION_INGEST_PROJECT_KEY: sikuli-go
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
        run: |
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TEST_STATION_BUILD_COMPLETED_AT="$completed_at"
          echo "TEST_STATION_BUILD_COMPLETED_AT=$completed_at" >> "$GITHUB_ENV"
          node ./scripts/test-station/publish-ingest-report.mjs

      - name: Upload test artifacts
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        uses: actions/upload-artifact@v6
        with:
          name: monorepo-test-station-results
          path: .test-results/test-station
          retention-days: 14

      - name: Fail if report detected regressions
        if: always()
        run: |
          exit_code="${{ steps.test_station.outputs.exit_code }}"
          if [ "${exit_code}" != "0" ]; then
            exit "${exit_code}"
          fi

  ocr-gosseract:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OCR native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev tesseract-ocr-eng

      - name: Run OCR tagged tests
        run: cd packages/api && go test -tags gosseract ./internal/ocr ./pkg/sikuli

  parity-e2e:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OCR native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev tesseract-ocr-eng

      - name: Install test tooling
        run: |
          go install gotest.tools/gotestsum@v1.12.0

      - name: Run parity e2e tests (default build)
        run: |
          set -euo pipefail
          mkdir -p .test-results-e2e
          cd packages/api
          "$(go env GOPATH)/bin/gotestsum" \
            --format standard-verbose \
            --junitfile ../../.test-results-e2e/junit-default.xml \
            --jsonfile ../../.test-results-e2e/go-test-default.json \
            -- \
            -run '^TestCrossProtocolIntegrationFlow$' ./pkg/sikuli

      - name: Run parity e2e tests (gosseract build tag)
        run: |
          set -euo pipefail
          cd packages/api
          "$(go env GOPATH)/bin/gotestsum" \
            --format standard-verbose \
            --junitfile ../../.test-results-e2e/junit-gosseract.xml \
            --jsonfile ../../.test-results-e2e/go-test-gosseract.json \
            -- \
            -tags gosseract -run '^TestCrossProtocolIntegrationFlowTaggedOCR$' ./pkg/sikuli

      - name: Publish parity e2e report (default)
        if: always() && hashFiles('.test-results-e2e/junit-default.xml') != ''
        uses: dorny/test-reporter@v2
        with:
          name: GoLang Parity E2E (default)
          path: .test-results-e2e/junit-default.xml
          reporter: java-junit
          fail-on-error: true

      - name: Publish parity e2e report (gosseract)
        if: always() && hashFiles('.test-results-e2e/junit-gosseract.xml') != ''
        uses: dorny/test-reporter@v2
        with:
          name: GoLang Parity E2E (gosseract)
          path: .test-results-e2e/junit-gosseract.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload parity e2e artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-parity-e2e-results
          path: .test-results-e2e
          retention-days: 14

  tagged-backend-build:
    name: Tagged Backend Build (gosseract+opencv)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OCR/OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libopencv-dev \
            libopencv-contrib-dev \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev \
            tesseract-ocr-eng

      - name: Compile with OCR + OpenCV tags
        run: |
          cd packages/api
          go test -run '^$' -tags "gosseract opencv gocv_specific_modules gocv_features2d gocv_calib3d" ./...
          cd ../..
          make build-go
