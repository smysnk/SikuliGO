name: Publish Docs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "docs-publish"
  cancel-in-progress: true

jobs:
  benchmark-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libopencv-dev libopencv-contrib-dev

      - name: Run benchmark suite
        env:
          FIND_BENCH_PATCH_READMES: "0"
          FIND_BENCH_PUBLISH_DOCS: "0"
          FIND_BENCH_DETERMINISTIC_REPORT: "1"
          FIND_BENCH_SEED: "20260304"
        run: make benchmark

      - name: Publish docs and benchmark results to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GH_PAGES_BRANCH: gh-pages
          GH_PAGES_INCLUDE_BENCH: "1"
          GH_PAGES_FORCE_PUSH: "1"
          GH_PAGES_COMMIT_MESSAGE: "docs(bench): publish benchmark reports for ${{ github.sha }}"
        run: make gh-publish

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docs-benchmark-results
          path: .test-results/bench
          retention-days: 14
