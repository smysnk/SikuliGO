<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runtime Snapshot</title>
    <style>
      body {
        margin: 0;
        padding: 22px;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef4ff 0%, #f7f9f2 54%, #edf7f0 100%);
        color: #14213d;
      }
      .shell {
        border-radius: 24px;
        padding: 22px;
        background: rgba(255,255,255,0.78);
        border: 1px solid rgba(20,33,61,0.08);
        box-shadow: 0 20px 56px rgba(20,33,61,0.08);
      }
      h1 { margin: 0 0 16px; font-size: 26px; }
      .frame {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(20,33,61,0.08);
        background: white;
      }
      img { display: block; width: 100%; height: auto; }
      .box {
        position: absolute;
        left: 43.5%;
        top: 42%;
        width: 10.5%;
        height: 11.5%;
        border: 3px solid rgba(36,92,255,0.92);
        border-radius: 12px;
        box-shadow: 0 0 0 999px rgba(20,33,61,0.12);
        animation: pulse 1.8s ease-in-out infinite;
      }
      .target {
        position: absolute;
        left: calc(48.75% - 8px);
        top: calc(47.75% - 8px);
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #1b8f6a;
        box-shadow: 0 0 0 10px rgba(27,143,106,0.18);
      }
      .caption {
        margin-top: 14px;
        color: #58657e;
        line-height: 1.55;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.02); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>Snapshot overlay</h1>
      <div class="frame">
        <img src="/demo/assets/source.png" alt="Captured source" />
        <div class="box"></div>
        <div class="target"></div>
      </div>
      <div class="caption">The snapshot pane can stay visible while the editor steps line by line, preserving the active match rectangle, target point, and the image that produced the current runtime call.</div>
    </div>
  </body>
</html>
